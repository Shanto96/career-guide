<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ask a Question</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0a0a0f;
        --surface: #13131a;
        --border: #1e1e2e;
        --accent: #6c63ff;
        --accent2: #00d4ff;
        --text: #f0f0f8;
        --muted: #6b6b8a;
      }

      body {
        font-family: "DM Sans", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        overflow: hidden;
      }

      /* Animated background */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(
            ellipse 60% 50% at 20% 30%,
            rgba(108, 99, 255, 0.12) 0%,
            transparent 60%
          ),
          radial-gradient(
            ellipse 50% 40% at 80% 70%,
            rgba(0, 212, 255, 0.08) 0%,
            transparent 60%
          );
        pointer-events: none;
        z-index: 0;
      }

      .card {
        position: relative;
        z-index: 1;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 3rem;
        width: 100%;
        max-width: 520px;
        box-shadow:
          0 40px 80px rgba(0, 0, 0, 0.5),
          0 0 0 1px rgba(108, 99, 255, 0.1);
        animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(32px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: rgba(108, 99, 255, 0.12);
        border: 1px solid rgba(108, 99, 255, 0.25);
        color: #a89fff;
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        padding: 5px 12px;
        border-radius: 100px;
        margin-bottom: 1.25rem;
      }

      .badge::before {
        content: "";
        width: 6px;
        height: 6px;
        background: var(--accent);
        border-radius: 50%;
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.5;
          transform: scale(0.8);
        }
      }

      h1 {
        font-family: "Syne", sans-serif;
        font-size: 2.2rem;
        font-weight: 800;
        line-height: 1.1;
        margin-bottom: 0.5rem;
        background: linear-gradient(135deg, #fff 30%, #a89fff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .subtitle {
        color: var(--muted);
        font-size: 0.95rem;
        margin-bottom: 2.5rem;
        line-height: 1.5;
      }

      .input-wrap {
        position: relative;
        margin-bottom: 1rem;
      }

      textarea {
        width: 100%;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--border);
        border-radius: 14px;
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        font-size: 1rem;
        padding: 1.1rem 1.25rem;
        resize: vertical;
        min-height: 110px;
        outline: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s,
          background 0.2s;
      }

      textarea::placeholder {
        color: var(--muted);
      }

      textarea:focus {
        border-color: var(--accent);
        background: rgba(108, 99, 255, 0.05);
        box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.15);
      }

      .char-count {
        position: absolute;
        bottom: 12px;
        right: 14px;
        font-size: 0.72rem;
        color: var(--muted);
      }

      .examples {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 1.75rem;
      }

      .example-chip {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid var(--border);
        border-radius: 100px;
        color: var(--muted);
        font-size: 0.78rem;
        padding: 5px 12px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .example-chip:hover {
        background: rgba(108, 99, 255, 0.1);
        border-color: rgba(108, 99, 255, 0.4);
        color: #a89fff;
      }

      button[type="submit"] {
        width: 100%;
        background: linear-gradient(135deg, var(--accent), #9b5de5);
        border: none;
        border-radius: 14px;
        color: #fff;
        font-family: "Syne", sans-serif;
        font-size: 1rem;
        font-weight: 700;
        padding: 1rem;
        cursor: pointer;
        transition:
          transform 0.15s,
          box-shadow 0.15s,
          filter 0.15s;
        position: relative;
        overflow: hidden;
      }

      button[type="submit"]::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.15),
          transparent
        );
        opacity: 0;
        transition: opacity 0.2s;
      }

      button[type="submit"]:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 32px rgba(108, 99, 255, 0.4);
        filter: brightness(1.05);
      }

      button[type="submit"]:hover::after {
        opacity: 1;
      }
      button[type="submit"]:active {
        transform: translateY(0);
      }

      .btn-inner {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .footer-note {
        text-align: center;
        color: var(--muted);
        font-size: 0.78rem;
        margin-top: 1.5rem;
      }

      .footer-note a {
        color: #a89fff;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="badge">Resume Intelligence</div>
      <h1>Ask Anything</h1>
      <p class="subtitle">
        Query your resume with natural language and get structured,
        section-by-section answers.
      </p>

      <form action="/ask" method="POST">
        <div class="input-wrap">
          <textarea
            name="query"
            id="queryInput"
            placeholder="e.g. What are the candidate's top technical skills?"
            required
            maxlength="500"
          ></textarea>
          <span class="char-count" id="charCount">0 / 500</span>
        </div>

        <div class="examples">
          <span class="example-chip" onclick="setQuery(this)"
            >Summarize work experience</span
          >
          <span class="example-chip" onclick="setQuery(this)"
            >List technical skills</span
          >
          <span class="example-chip" onclick="setQuery(this)"
            >Make this a Data Analyst CV</span
          >
          <span class="example-chip" onclick="setQuery(this)"
            >Key achievements</span
          >
        </div>

        <button type="submit">
          <span class="btn-inner">
            <svg
              width="18"
              height="18"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              viewBox="0 0 24 24"
            >
              <path d="M22 2L11 13" />
              <path d="M22 2L15 22 11 13 2 9l20-7z" />
            </svg>
            Ask Question
          </span>
        </button>
      </form>

      <p class="footer-note">
        Powered by RAG · <a href="/">Upload another resume</a>
      </p>
    </div>

    <script>
      const textarea = document.getElementById("queryInput");
      const counter = document.getElementById("charCount");
      textarea.addEventListener("input", () => {
        counter.textContent = `${textarea.value.length} / 500`;
      });

      function setQuery(el) {
        textarea.value = el.textContent;
        counter.textContent = `${textarea.value.length} / 500`;
        textarea.focus();
      }
    </script>
  </body>
</html>
