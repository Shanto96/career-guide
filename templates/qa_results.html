<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Answer</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0a0f;
            --surface: #13131a;
            --surface2: #1a1a24;
            --border: #1e1e2e;
            --accent: #6c63ff;
            --accent2: #00d4ff;
            --green: #00e5a0;
            --orange: #ff8a3d;
            --pink: #ff6b9d;
            --yellow: #ffd166;
            --text: #f0f0f8;
            --muted: #6b6b8a;
            --muted2: #9090b0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem 1.5rem 4rem;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 40% at 15% 20%, rgba(108,99,255,0.1) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 85% 80%, rgba(0,212,255,0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .page {
            position: relative;
            z-index: 1;
            max-width: 780px;
            margin: 0 auto;
        }

        /* Header */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2.5rem;
            animation: fadeIn 0.4s ease both;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--muted);
            font-size: 0.85rem;
            text-decoration: none;
            padding: 8px 14px;
            border: 1px solid var(--border);
            border-radius: 100px;
            background: var(--surface);
            transition: all 0.2s;
        }

        .back-btn:hover {
            color: var(--text);
            border-color: rgba(108,99,255,0.4);
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1rem;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Query card */
        .query-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 1.5rem 1.75rem;
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
            align-items: flex-start;
            animation: fadeIn 0.5s 0.1s ease both;
        }

        .query-icon {
            width: 38px; height: 38px;
            background: rgba(108,99,255,0.15);
            border: 1px solid rgba(108,99,255,0.3);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }

        .query-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 4px;
        }

        .query-text {
            font-size: 1.05rem;
            font-weight: 500;
            color: var(--text);
            line-height: 1.4;
        }

        /* Sections grid */
        .sections {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .section-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            overflow: hidden;
            opacity: 0;
            animation: slideIn 0.4s ease forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 1.1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
        }

        .section-header:hover { background: rgba(255,255,255,0.02); }

        .section-icon {
            width: 34px; height: 34px;
            border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .section-title {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            flex: 1;
        }

        .section-toggle {
            color: var(--muted);
            transition: transform 0.3s;
        }

        .section-toggle.open { transform: rotate(180deg); }

        .section-body {
            padding: 1.25rem 1.5rem;
            line-height: 1.75;
            color: var(--muted2);
            font-size: 0.95rem;
            display: none;
        }

        .section-body.open { display: block; }

        .section-body p { margin-bottom: 0.6rem; }
        .section-body p:last-child { margin-bottom: 0; }

        /* Bullet items */
        .section-body ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .section-body ul li {
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }

        .section-body ul li::before {
            content: '▸';
            color: var(--accent);
            font-size: 0.75rem;
            margin-top: 3px;
            flex-shrink: 0;
        }

        /* Tag pills for skills */
        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag {
            background: rgba(108,99,255,0.1);
            border: 1px solid rgba(108,99,255,0.2);
            color: #a89fff;
            font-size: 0.8rem;
            padding: 4px 12px;
            border-radius: 100px;
        }

        /* Raw fallback */
        .raw-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 1.5rem;
            color: var(--muted2);
            line-height: 1.8;
            white-space: pre-wrap;
            font-size: 0.93rem;
        }

        /* Copy button */
        .copy-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: var(--muted);
            font-size: 0.8rem;
            padding: 6px 14px;
            border-radius: 100px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .copy-btn:hover { background: rgba(108,99,255,0.1); color: var(--text); }

        .results-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .results-title {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 1.3rem;
        }

        /* Ask again */
        .ask-again {
            margin-top: 2rem;
            text-align: center;
        }

        .ask-again a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, var(--accent), #9b5de5);
            color: #fff;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            padding: 0.8rem 1.75rem;
            border-radius: 100px;
            text-decoration: none;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .ask-again a:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(108,99,255,0.4);
        }

        /* Color variants per section */
        .color-purple .section-icon { background: rgba(108,99,255,0.15); }
        .color-cyan   .section-icon { background: rgba(0,212,255,0.12); }
        .color-green  .section-icon { background: rgba(0,229,160,0.12); }
        .color-orange .section-icon { background: rgba(255,138,61,0.12); }
        .color-pink   .section-icon { background: rgba(255,107,157,0.12); }
        .color-yellow .section-icon { background: rgba(255,209,102,0.12); }

        .color-purple .section-title { color: #a89fff; }
        .color-cyan   .section-title { color: #5de8ff; }
        .color-green  .section-title { color: #00e5a0; }
        .color-orange .section-title { color: #ff8a3d; }
        .color-pink   .section-title { color: #ff6b9d; }
        .color-yellow .section-title { color: #ffd166; }

        .color-purple .section-header { border-left: 3px solid rgba(108,99,255,0.5); }
        .color-cyan   .section-header { border-left: 3px solid rgba(0,212,255,0.4); }
        .color-green  .section-header { border-left: 3px solid rgba(0,229,160,0.4); }
        .color-orange .section-header { border-left: 3px solid rgba(255,138,61,0.4); }
        .color-pink   .section-header { border-left: 3px solid rgba(255,107,157,0.4); }
        .color-yellow .section-header { border-left: 3px solid rgba(255,209,102,0.4); }
    </style>
</head>
<body>
    <div class="page">

        <div class="page-header">
            <a href="/ask" class="back-btn">
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
                Ask another
            </a>
            <span class="logo">ResumeAI</span>
            <a href="/" class="back-btn">Upload</a>
        </div>

        <!-- Query display -->
        <div class="query-card">
            <div class="query-icon">
                <svg width="18" height="18" fill="none" stroke="#a89fff" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
            </div>
            <div>
                <div class="query-label">Your Query</div>
                <div class="query-text">{{ query }}</div>
            </div>
        </div>

        <!-- Results -->
        <div class="results-header">
            <span class="results-title">Answer</span>
            <button class="copy-btn" onclick="copyAll()">
                <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
                Copy all
            </button>
        </div>

        <div class="sections" id="sectionsContainer">
            <!-- Populated by JS -->
        </div>

        <div class="ask-again">
            <a href="/ask">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M22 2L11 13"/><path d="M22 2L15 22 11 13 2 9l20-7z"/></svg>
                Ask another question
            </a>
        </div>
    </div>

    <script>
        // Raw result injected from Flask via Jinja
        const RAW_RESULT = {{ result | tojson }};

        // ── Section definitions ──────────────────────────────────────────────
        const SECTION_DEFS = [
            { keys: ['summary','overview','profile','objective','career objective','about'],
              icon: '👤', color: 'color-purple', label: 'Summary' },
            { keys: ['skill','expertise','technical','technology','tools','stack','languages','competencies'],
              icon: '⚡', color: 'color-cyan', label: 'Skills & Expertise' },
            { keys: ['experience','work','employment','professional','position','role','career','job'],
              icon: '💼', color: 'color-green', label: 'Work Experience' },
            { keys: ['education','degree','university','college','academic','qualification','study'],
              icon: '🎓', color: 'color-orange', label: 'Education' },
            { keys: ['achievement','award','accomplishment','recognition','certification','cert','honor'],
              icon: '🏆', color: 'color-yellow', label: 'Achievements' },
            { keys: ['project','portfolio','work sample','case study','publication'],
              icon: '🚀', color: 'color-pink', label: 'Projects' },
        ];

        // ── Parse result into labelled sections ──────────────────────────────
        function parseResult(text) {
            // Normalize markdown: ** bold **, # headings, --- separators
            const lines = text.split('\n').map(l => l.trim()).filter(l => l);

            const sections = [];
            let current = null;

            const headingRe = /^(#{1,3}\s+|[\*_]{2,})(.*?)([\*_]{2,})?:?\s*$|^[-–—]{3,}(.*?)[-–—]{0,}\s*$/;
            const strongRe  = /^\*{2}(.+?)\*{2}:?\s*$/;

            function flush() {
                if (current && current.lines.length > 0) sections.push(current);
            }

            for (const line of lines) {
                // Remove markdown markers
                let clean = line.replace(/\*\*/g, '').replace(/^#+\s*/, '').replace(/^[-–—]+$/, '').trim();
                if (!clean) continue;

                // Detect heading lines (ends with colon OR fully caps OR matches known keys)
                const isHeading = /^[\w\s&\/\-]{3,40}:$/.test(clean) ||
                                  /^[A-Z][A-Z\s&\/\-]{4,}$/.test(clean) ||
                                  strongRe.test(line);

                if (isHeading) {
                    flush();
                    const title = clean.replace(/:$/, '').trim();
                    current = { title, lines: [] };
                } else {
                    if (!current) current = { title: 'Answer', lines: [] };
                    current.lines.push(clean);
                }
            }
            flush();

            // If no sections were found, treat entire text as one block
            if (sections.length === 0) {
                sections.push({ title: 'Answer', lines: lines });
            }

            return sections;
        }

        // ── Match a section title to a style def ────────────────────────────
        function matchDef(title) {
            const lower = title.toLowerCase();
            for (const def of SECTION_DEFS) {
                if (def.keys.some(k => lower.includes(k))) return def;
            }
            return { icon: '📋', color: 'color-purple', label: title };
        }

        // ── Detect if lines look like skill tags ─────────────────────────────
        function isSkillsSection(title) {
            return /skill|technolog|tool|stack|competenc/i.test(title);
        }

        // ── Render line as HTML ───────────────────────────────────────────────
        function renderLines(lines, isSkills) {
            if (isSkills) {
                // Extract comma/pipe/bullet separated skills and render as tags
                const allText = lines.join(' ');
                const skills = allText.split(/[,|•·*\n]/).map(s => s.trim()).filter(s => s.length > 1 && s.length < 50);
                if (skills.length > 2) {
                    return `<div class="tags">${skills.map(s => `<span class="tag">${s}</span>`).join('')}</div>`;
                }
            }

            // Detect if all lines are bullet-like
            const bulletLines = lines.filter(l => /^[-*•·▸►]/.test(l) || l.startsWith('* '));
            if (bulletLines.length > lines.length * 0.5) {
                const items = lines.map(l => l.replace(/^[-*•·▸►]\s*/, '').trim()).filter(Boolean);
                return `<ul>${items.map(i => `<li>${i}</li>`).join('')}</ul>`;
            }

            // Paragraph
            return lines.map(l => `<p>${l}</p>`).join('');
        }

        // ── Build DOM ─────────────────────────────────────────────────────────
        function render() {
            const container = document.getElementById('sectionsContainer');
            const parsed = parseResult(RAW_RESULT);

            parsed.forEach((sec, idx) => {
                const def = matchDef(sec.title);
                const card = document.createElement('div');
                card.className = `section-card ${def.color}`;
                card.style.animationDelay = `${0.15 + idx * 0.07}s`;

                const bodyHtml = renderLines(sec.lines, isSkillsSection(sec.title));

                card.innerHTML = `
                    <div class="section-header" onclick="toggle(this)">
                        <div class="section-icon">${def.icon}</div>
                        <span class="section-title">${sec.title}</span>
                        <svg class="section-toggle open" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M18 15l-6-6-6 6"/></svg>
                    </div>
                    <div class="section-body open">${bodyHtml}</div>
                `;

                container.appendChild(card);
            });
        }

        function toggle(header) {
            const body   = header.nextElementSibling;
            const arrow  = header.querySelector('.section-toggle');
            const isOpen = body.classList.contains('open');
            body.classList.toggle('open', !isOpen);
            arrow.classList.toggle('open', !isOpen);
        }

        function copyAll() {
            navigator.clipboard.writeText(RAW_RESULT).then(() => {
                const btn = document.querySelector('.copy-btn');
                btn.textContent = '✓ Copied';
                setTimeout(() => btn.innerHTML = `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copy all`, 2000);
            });
        }

        render();
    </script>
</body>
</html>
