<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Answer — KS Analytics</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #080b14;
      --surface:  #111827;
      --surface2: #161f30;
      --border:   #1f2a3c;
      --teal:     #0ef2c8;
      --teal-dim: rgba(14,242,200,0.1);
      --blue:     #3b82f6;
      --text:     #e8edf5;
      --muted:    #6b7a96;
      --muted2:   #9aa3b8;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(14,242,200,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(14,242,200,0.025) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none; z-index: 0;
    }

    body::after {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 55% 45% at 5% 10%, rgba(14,242,200,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 95% 90%, rgba(59,130,246,0.06) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }

    /* ── Nav ── */
    nav {
      position: relative; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.4rem 3rem;
      border-bottom: 1px solid var(--border);
      background: rgba(8,11,20,0.8);
      backdrop-filter: blur(12px);
    }

    .nav-logo {
      display: flex; align-items: center; gap: 10px;
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem;
      color: var(--text); text-decoration: none;
    }

    .logo-icon {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, var(--teal), var(--blue));
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
    }

    .nav-actions { display: flex; gap: 10px; }

    .btn-ghost {
      display: inline-flex; align-items: center; gap: 6px;
      border: 1px solid var(--border); background: transparent;
      color: var(--muted2);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.82rem; font-weight: 500;
      padding: 7px 16px; border-radius: 100px;
      text-decoration: none; cursor: pointer;
      transition: all 0.2s;
    }

    .btn-ghost:hover { border-color: var(--teal); color: var(--teal); }

    .btn-primary {
      display: inline-flex; align-items: center; gap: 6px;
      background: linear-gradient(135deg, var(--teal), #00b4d8);
      border: none; border-radius: 100px;
      color: #050d0b;
      font-family: 'Syne', sans-serif;
      font-size: 0.82rem; font-weight: 800;
      padding: 8px 18px;
      text-decoration: none; cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(14,242,200,0.3);
    }

    /* ── Page ── */
    .page {
      position: relative; z-index: 1;
      max-width: 860px; margin: 0 auto;
      padding: 3rem 2rem 5rem;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Page header ── */
    .page-header {
      margin-bottom: 1.75rem;
      opacity: 0; animation: fadeUp 0.45s 0.05s ease forwards;
    }

    .page-eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 0.73rem; font-weight: 600;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--teal); margin-bottom: 0.7rem;
    }

    .eyebrow-line { width: 24px; height: 2px; background: var(--teal); }

    .page-title {
      font-family: 'Syne', sans-serif;
      font-size: 2.2rem; font-weight: 800;
      letter-spacing: -0.02em; line-height: 1.1;
      color: var(--text);
    }

    .page-title span { color: var(--teal); }

    /* ── Query bubble ── */
    .query-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 2rem;
      display: flex; gap: 1rem; align-items: flex-start;
      opacity: 0; animation: fadeUp 0.45s 0.12s ease forwards;
    }

    .query-avatar {
      width: 38px; height: 38px; flex-shrink: 0;
      background: var(--teal-dim);
      border: 1px solid rgba(14,242,200,0.25);
      border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
    }

    .query-label {
      font-size: 0.68rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--muted); margin-bottom: 4px;
    }

    .query-text {
      font-size: 1rem; font-weight: 500; color: var(--text); line-height: 1.45;
    }

    /* ── Results toolbar ── */
    .toolbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1rem;
      opacity: 0; animation: fadeUp 0.45s 0.18s ease forwards;
    }

    .toolbar-title {
      font-family: 'Syne', sans-serif;
      font-size: 1rem; font-weight: 700; color: var(--muted2);
    }

    .copy-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      color: var(--muted); font-size: 0.78rem;
      padding: 5px 13px; border-radius: 100px;
      cursor: pointer; transition: all 0.2s;
    }

    .copy-btn:hover { background: var(--teal-dim); color: var(--teal); border-color: rgba(14,242,200,0.3); }

    /* ── Section cards ── */
    .sections { display: flex; flex-direction: column; gap: 10px; }

    .section-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px; overflow: hidden;
      opacity: 0; animation: fadeUp 0.4s ease forwards;
    }

    .section-header {
      display: flex; align-items: center; gap: 12px;
      padding: 1rem 1.4rem;
      cursor: pointer; user-select: none;
      border-bottom: 1px solid transparent;
      transition: background 0.2s;
    }

    .section-header:hover { background: rgba(255,255,255,0.018); }
    .section-header.open { border-bottom-color: var(--border); }

    .section-icon {
      width: 34px; height: 34px; flex-shrink: 0;
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
    }

    .section-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem; font-weight: 700; flex: 1;
    }

    .arrow { color: var(--muted); transition: transform 0.3s; }
    .arrow.open { transform: rotate(180deg); }

    .section-body {
      padding: 1.25rem 1.4rem;
      font-size: 0.92rem; line-height: 1.8;
      color: var(--muted2); display: none;
    }

    .section-body.open { display: block; }
    .section-body p { margin-bottom: 0.55rem; }
    .section-body p:last-child { margin-bottom: 0; }

    .section-body ul { list-style: none; display: flex; flex-direction: column; gap: 7px; }

    .section-body ul li {
      display: flex; gap: 10px; align-items: flex-start;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 9px; padding: 8px 12px;
    }

    .section-body ul li::before {
      content: '▸'; color: var(--teal);
      font-size: 0.7rem; margin-top: 4px; flex-shrink: 0;
    }

    .tags { display: flex; flex-wrap: wrap; gap: 7px; }

    .tag {
      background: rgba(14,242,200,0.07);
      border: 1px solid rgba(14,242,200,0.18);
      color: var(--teal);
      font-size: 0.79rem; font-weight: 500;
      padding: 4px 12px; border-radius: 100px;
    }

    /* ── Color themes ── */
    .c-teal   .section-icon { background: rgba(14,242,200,0.1); border:1px solid rgba(14,242,200,0.2); }
    .c-blue   .section-icon { background: rgba(59,130,246,0.1); border:1px solid rgba(59,130,246,0.2); }
    .c-amber  .section-icon { background: rgba(251,191,36,0.1); border:1px solid rgba(251,191,36,0.2); }
    .c-pink   .section-icon { background: rgba(244,114,182,0.1); border:1px solid rgba(244,114,182,0.2); }
    .c-indigo .section-icon { background: rgba(129,140,248,0.1); border:1px solid rgba(129,140,248,0.2); }
    .c-orange .section-icon { background: rgba(251,146,60,0.1); border:1px solid rgba(251,146,60,0.2); }

    .c-teal   .section-title { color: #0ef2c8; }
    .c-blue   .section-title { color: #60a5fa; }
    .c-amber  .section-title { color: #fbbf24; }
    .c-pink   .section-title { color: #f472b6; }
    .c-indigo .section-title { color: #a5b4fc; }
    .c-orange .section-title { color: #fb923c; }

    .c-teal   .section-header { border-left: 3px solid rgba(14,242,200,0.5); }
    .c-blue   .section-header { border-left: 3px solid rgba(59,130,246,0.5); }
    .c-amber  .section-header { border-left: 3px solid rgba(251,191,36,0.5); }
    .c-pink   .section-header { border-left: 3px solid rgba(244,114,182,0.5); }
    .c-indigo .section-header { border-left: 3px solid rgba(129,140,248,0.5); }
    .c-orange .section-header { border-left: 3px solid rgba(251,146,60,0.5); }

    /* ── Ask again ── */
    .ask-again {
      text-align: center; margin-top: 2.5rem;
      opacity: 0; animation: fadeUp 0.45s 0.5s ease forwards;
    }

    .ask-again a {
      display: inline-flex; align-items: center; gap: 8px;
      background: linear-gradient(135deg, var(--teal), #00b4d8);
      color: #050d0b;
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: 0.9rem; padding: 0.85rem 2rem;
      border-radius: 100px; text-decoration: none;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .ask-again a:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(14,242,200,0.3);
    }

    @media (max-width: 640px) {
      nav { padding: 1.1rem 1.25rem; }
      .page { padding: 2rem 1.25rem 4rem; }
      .page-title { font-size: 1.7rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="nav-logo">
      <div class="logo-icon">⚡</div>
      KS Analytics
    </a>
    <div class="nav-actions">
      <a href="/ask" class="btn-ghost">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        Ask Again
      </a>
      <a href="/" class="btn-primary">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Upload
      </a>
    </div>
  </nav>

  <div class="page">

    <div class="page-header">
      <div class="page-eyebrow">
        <span class="eyebrow-line"></span>
        Question Answered
      </div>
      <h1 class="page-title">Your <span>Answer</span></h1>
    </div>

    <!-- Query display -->
    <div class="query-bubble">
      <div class="query-avatar">💬</div>
      <div>
        <div class="query-label">Your Query</div>
        <div class="query-text">{{ query }}</div>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <span class="toolbar-title">Results</span>
      <button class="copy-btn" onclick="copyAll()">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        Copy all
      </button>
    </div>

    <div class="sections" id="sectionsContainer"></div>

    <div class="ask-again">
      <a href="/ask">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M22 2L11 13"/><path d="M22 2L15 22 11 13 2 9l20-7z"/></svg>
        Ask Another Question
      </a>
    </div>

  </div>

  <script>
    const RAW = {{ result | tojson }};

    const DEFS = [
      { keys:['summary','overview','objective','profile','about','career'],    icon:'👤', color:'c-teal',   label:'Summary' },
      { keys:['skill','expertise','technical','technology','tools','stack'],    icon:'⚡', color:'c-blue',   label:'Skills' },
      { keys:['experience','work','employment','professional','position','job'],icon:'💼', color:'c-indigo', label:'Experience' },
      { keys:['education','degree','university','college','academic','study'],  icon:'🎓', color:'c-amber',  label:'Education' },
      { keys:['achievement','award','accomplishment','certification','honor'],  icon:'🏆', color:'c-orange', label:'Achievements' },
      { keys:['project','portfolio','publication'],                             icon:'🚀', color:'c-pink',   label:'Projects' },
    ];

    function matchDef(t) {
      const l = t.toLowerCase();
      for (const d of DEFS) if (d.keys.some(k => l.includes(k))) return d;
      return { icon:'📋', color:'c-teal', label: t };
    }

    function parse(text) {
      const lines = text.split('\n').map(l=>l.trim()).filter(Boolean);
      const secs=[]; let cur=null;
      const flush=()=>{ if(cur&&cur.lines.length) secs.push(cur); };
      for(const line of lines){
        const clean=line.replace(/\*\*/g,'').replace(/^#+\s*/,'').trim();
        if(!clean) continue;
        const isH=/^[\w\s&\/\-]{3,40}:$/.test(clean)||/^[A-Z][A-Z\s&\/\-]{4,}$/.test(clean)||/^\*{2}.+\*{2}:?\s*$/.test(line);
        if(isH){ flush(); cur={title:clean.replace(/:$/,'').trim(),lines:[]}; }
        else { if(!cur) cur={title:'Answer',lines:[]}; cur.lines.push(clean); }
      }
      flush();
      return secs.length ? secs : [{title:'Answer',lines}];
    }

    function isSkills(t){ return /skill|tech|tool|stack|competenc/i.test(t); }

    function renderBody(lines, skillSec){
      if(skillSec){
        const skills=lines.join(' ').split(/[,|•·*\n]/).map(s=>s.trim()).filter(s=>s.length>1&&s.length<50);
        if(skills.length>2) return `<div class="tags">${skills.map(s=>`<span class="tag">${s}</span>`).join('')}</div>`;
      }
      const bull=lines.filter(l=>/^[-*•·▸►]/.test(l)).length > lines.length*0.5;
      if(bull){
        const items=lines.map(l=>l.replace(/^[-*•·▸►]\s*/,'').trim()).filter(Boolean);
        return `<ul>${items.map(i=>`<li>${i}</li>`).join('')}</ul>`;
      }
      return lines.map(l=>`<p>${l}</p>`).join('');
    }

    function build(){
      const c=document.getElementById('sectionsContainer');
      parse(RAW).forEach((sec,i)=>{
        const def=matchDef(sec.title);
        const card=document.createElement('div');
        card.className=`section-card ${def.color}`;
        card.style.animationDelay=`${0.22+i*0.08}s`;
        card.innerHTML=`
          <div class="section-header open" onclick="toggle(this)">
            <div class="section-icon">${def.icon}</div>
            <span class="section-title">${sec.title}</span>
            <svg class="arrow open" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M18 15l-6-6-6 6"/></svg>
          </div>
          <div class="section-body open">${renderBody(sec.lines,isSkills(sec.title))}</div>
        `;
        c.appendChild(card);
      });
    }

    function toggle(hdr){
      const body=hdr.nextElementSibling;
      const arr=hdr.querySelector('.arrow');
      const open=body.classList.contains('open');
      body.classList.toggle('open',!open);
      arr.classList.toggle('open',!open);
      hdr.classList.toggle('open',!open);
    }

    function copyAll(){
      navigator.clipboard.writeText(RAW).then(()=>{
        const b=document.querySelector('.copy-btn');
        const orig=b.innerHTML;
        b.textContent='✓ Copied!';
        setTimeout(()=>b.innerHTML=orig,2000);
      });
    }

    build();
  </script>
</body>
</html>
